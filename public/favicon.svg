<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Sleek dark background matching the user's navbar logo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d333b" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <!-- Subtle glassmorphic border -->
    <linearGradient id="border" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  
  <!-- Rounded Square Button -->
  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#bg)" />
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="url(#border)" stroke-width="1" />
  
  <!-- Lucide Car Icon - Centered and slightly bolded to pop in small favicon sizes -->
  <g transform="translate(4,4)" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/>
    <circle cx="7" cy="17" r="2.2"/>
    <path d="M9 17h6"/>
    <circle cx="17" cy="17" r="2.2"/>
  </g>
</svg>
